<!DOCTYPE html>
<html>
<head>
    <title>Alert Button</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Simple Alert Button</h2>

    <button onclick="showAlert()">Click Me</button>

    <script>
        function showAlert() {
            alert("Hello User! Welcome to JavaScript.");
        }
    </script>

</body>
</html>
